name: Deploy to Cloud Run

on:
  push:
    branches: [production]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: promptlock
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test ./... -count=1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create Artifact Registry repo if needed
        run: |
          gcloud artifacts repositories describe promptlock \
            --location=$REGION --format="value(name)" 2>/dev/null || \
          gcloud artifacts repositories create promptlock \
            --repository-format=docker \
            --location=$REGION \
            --description="PromptLock container images"

      - name: Build and push container
        run: |
          gcloud auth configure-docker $REGISTRY --quiet
          IMAGE=$REGISTRY/$PROJECT_ID/promptlock/$SERVICE:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=$REGISTRY/$PROJECT_ID/promptlock/$SERVICE:${{ github.sha }}
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 80 \
            --timeout 10s

      - name: Show URL
        run: |
          gcloud run services describe $SERVICE \
            --region $REGION \
            --format='value(status.url)'
