steps:
  # Build the container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/promptlock:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/promptlock:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/promptlock:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/promptlock:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'promptlock'
      - '--image=gcr.io/$PROJECT_ID/promptlock:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--concurrency=80'
      - '--timeout=10s'
      - '--set-env-vars=PROMPTLOCK_LEVEL=balanced,PROMPTLOCK_REDACT_PII=true'

images:
  - 'gcr.io/$PROJECT_ID/promptlock:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/promptlock:latest'
